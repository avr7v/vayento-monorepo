services:
  postgres:
    image: postgres:16-alpine
    container_name: vayento-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vayento
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: vayento-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: vayento-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
      mc mb -p local/vayento-media || true;
      mc anonymous set download local/vayento-media || true;
      exit 0;
      "

  mailpit:
    image: axllent/mailpit:latest
    container_name: vayento-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build: ./backend
    container_name: vayento-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - minio
      - minio-init
      - mailpit
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vayento?schema=public
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      REQUIRE_EMAIL_VERIFICATION: "false"
      AUTO_VERIFY_REGISTERED_USERS: "true"
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_USER: local
      SMTP_PASS: local
      MAIL_FROM: Vayento <no-reply@vayento.local>
      ADMIN_ALERT_EMAIL: admin@vayento.local
      STORAGE_BUCKET: vayento-media
      STORAGE_REGION: eu-central-1
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin
      STORAGE_PUBLIC_BASE_URL: http://localhost:9000/vayento-media
      STORAGE_FORCE_PATH_STYLE: "true"
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    container_name: vayento-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ""
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
